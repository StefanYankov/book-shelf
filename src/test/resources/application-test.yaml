spring:
  jpa:
    hibernate:
      # We strictly validate the schema in tests just like in production
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Enables Flyway to run against the Testcontainer before Hibernate validates
  flyway:
    enabled: true
    locations: classpath:db/migration

# NOTE: This is a shared test profile. Changes here may have side effects on other tests.
# For isolated properties, consider using @TestPropertySource on the specific test class.
application:
  security:
    jwt:
      secret-key: "test_secret_key_of_at_least_256_bits_for_signing_purposes_123456"
      expiration: 60000
