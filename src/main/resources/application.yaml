spring:
  application:
    name: book-shelf
  main:
    banner-mode: off
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    web:
      pageable:
        max-page-size: 200
        default-page-size: 20
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5p --- [%15.15t] %-40.40logger{39} : %m%n"
  file:
    name: logs/book-shelf.log
  logback:
    rollingpolicy:
      max-history: 7
      total-size-cap: 100MB
  level:
    root: INFO
    bg.softuni.bookshelf: INFO
    org.springframework: WARN

application:
  security:
    jwt:
      # This MUST be provided via an environment variable in production
      secret-key: ${JWT_SECRET_KEY}
      expiration: 3600000 # 60 minutes (limits lock-bypass window; see refresh-token note)
    auto-seed-admin: false

# --- NEW: CORS configuration (same env-var pattern as JWT_SECRET_KEY) ---
# Provide a comma-separated list via the env var in prod.
# Example: APP_CORS_ALLOWED_ORIGINS=https://bookshelf.example.com,https://www.bookshelf.example.com
# The value after ':' is a safe fallback so a misconfigured deployment fails loudly to the RIGHT domain,
# not silently to localhost.
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://bookshelf.example.com}