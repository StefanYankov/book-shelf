<header class="admin-header">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      @if (isNavigationRestricted()) {
        <span class="navbar-brand">Admin Panel</span>
      } @else {
        <a class="navbar-brand" routerLink="/admin/users">Admin Panel</a>
      }

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          @if (!isNavigationRestricted()) {
            <li class="nav-item">
              <a class="nav-link" routerLink="/admin/users" routerLinkActive="active">Users</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/admin/moderation" routerLinkActive="active">Moderation</a>
            </li>
          }
        </ul>
        <ul class="navbar-nav gap-2">
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/profile" routerLinkActive="active">My Security</a>
          </li>
          <li class="nav-item">
            <button class="btn btn-link nav-link" (click)="logout()">Logout</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
