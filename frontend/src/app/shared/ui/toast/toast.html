<div class="toast-container position-fixed bottom-0 end-0 p-3">
  @for (toast of toastService.toasts(); track toast) {
    <div
      class="toast show align-items-center text-bg-{{ toast.type === 'success' ? 'success' : 'danger' }} border-0"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
      animate.enter="enter-animation"
      animate.leave="leave-animation">
      <div class="d-flex">
        <div class="toast-body">
          {{ toast.message }}
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toastService.remove(toast)" aria-label="Close"></button>
      </div>
    </div>
  }
</div>
